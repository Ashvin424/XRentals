<!DOCTYPE html>
<html lang="en">
    <head>

        <title>XRentals Registration</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

/* universal */
*{
    font-family: 'Poppins',sans-serif;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
    scroll-padding-top: 4rem;
    list-style: none;
    color: #314862;
    text-decoration: none;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        *::-webkit-scrollbar {
            display: none;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .form-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(139, 136, 177, 0.1);
            width: 400px;
        }

        h2 {
            /* text-align: center; */
            color: #bf6464;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #error-message {
            color: red;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
    </head>
    <body>
        <div class="container">
            <div class="form-container">
                <h2 style="color:#314862 ;">Sign Up Now</h2>
                <h3>Welcome Let's get <br>started</h3><br>
                <form id="registrationForm">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone"
                            pattern="[0-9]{10}" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password"
                            required>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword"
                            name="confirmPassword" required>
                    </div>
                    <div class="input-group">
                        <button type="submit">Sign Up</button>
                    </div>
                    <p id="error-message"></p>
                </form>

                <h4 style="text-align: right;">Already have account?</h4>
                <br>
                <button name="logIn" class="logIn"
                    onclick="location.href='login_page.html'">Log
                    In<inp></inp></button>
            </div>
        </div>

        <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('error-message');
            
            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match!";
            } else {
                errorMessage.textContent = "";
                // Simulate successful registration
                alert('Registration successful!');
                // Reset form
                document.getElementById('registrationForm').reset();
            }
        });
    </script>
    </body>
</html>
